site_name: itdirr
site_description: Python SDK for ИТД.com API — форк ITDpy by IRRatium
site_author: IRRatium
site_url: https://irratium.github.io/itdirr/
repo_name: IRRatium/itdirr
repo_url: https://github.com/IRRatium/itdirr

theme:
  name: material
  favicon: assets/favicon.png
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/irring.css

nav:
  - Home: index.md

  - Getting Started:
      - Quickstart: quickstart.md

  - Navigation:
      - Navigation: NAVIGATION.md

  - API:
      - Clans: clans.md
      - Comments: comments.md
      - Discovery: discovery.md
      - Formatting: formatting.md
      - Notifications: notifications.md
      - Online: online.md
      - Pins: pins.md
      - Polls: polls.md
      - Portal: portal.md
      - Posts: posts.md
      - Profile: profile.md
      - Settings: settings.md
      - Upload: upload.md
      - Users: users.md
      - Views: views.md
      - Wall: wall.md

  - Models:
      - Actor: models/actor.md
      - Comment: models/comment.md
      - Comments: models/comments.md
      - Discovery: models/discovery.md
      - Notification: models/notification.md
      - Notifications: models/notifications.md
      - Pagination: models/pagination.md
      - Pins: models/pins.md
      - Poll: models/poll.md
      - Portal: models/portal.md
      - Post: models/post.md
      - Posts: models/posts.md
      - Settings: models/settings.md
      - Users: models/users.md
